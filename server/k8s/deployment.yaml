apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopapi
  namespace: shopmcp
  labels:
    app: shopapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shopapi
  template:
    metadata:
      labels:
        app: shopapi
    spec:
      containers:
        - name: shopapi
          image: pricecs/shopmcp-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          # Non-secret env vars — configure directly
          env:
            - name: PORT
              value: "3000"
            - name: ALLOWED_ORIGIN
              value: "https://cprice-ping.github.io"
          # Secret env vars — sourced from the Secret
          envFrom:
            - secretRef:
                name: shopapi-secrets
          # Health probes matching the /health endpoint
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu:    "50m"
              memory: "64Mi"
            limits:
              cpu:    "250m"
              memory: "256Mi"
          # Mount products.json from a ConfigMap so you can update the catalog
          # without rebuilding the image (see configmap.yaml)
          volumeMounts:
            - name: products
              mountPath: /app/products.json
              subPath: products.json
              readOnly: true
      volumes:
        - name: products
          configMap:
            name: shopapi-products
